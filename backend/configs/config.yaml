#--------------------------технические параметры для Hydra----------------------------------------
defaults:
  - override hydra/job_logging: disabled

hydra:
  output_subdir: null
  run:
    dir: .
  job_logging:
    handlers:
      file:
        class: logging.NullHandler
#------------------------------------------------------------------------------------------------

#-----------------------------------Параметры конфигурации проекта--------------------------------
rendering:
  fps_buffer_size: 15               # количество кадров за которое производится расчет FPS


detection:
  model_path: weights/yolov8m.onnx  # Путь к модели
  conf: 0.45                        # Порог уверенности детектора (чем больше значение, тем меньше находит)
  classes: [2,3,5,7]                # 2: car, 3: motorcycle, 5: bus, 7: truck
  tracking: bytetrack.yaml          # Математические настройки алгоритма слежения (можно выбрать botsort.yaml или bytetrack.yaml)
  track_buffer: 60                  # Время жизни трека в кадрах


database:
  db_url: "postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/ProjectForTrafficAnalytics"


email:
  smtp_server: "smtp.gmail.com"                  # Почтовый сервер Google
  smtp_port: 587                                 # Стандартный защищенный SSL-порт
